<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOE X</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            padding: 40px;
            max-width: 800px;
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 16px;
        }

        .subtitle {
            font-size: 1.3rem;
            color: #94a3b8;
            margin-bottom: 30px;
        }

        .desc {
            line-height: 1.8;
            margin-bottom: 40px;
            color: #cbd5e1;
        }

        .links {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .btn {
            text-decoration: none;
            color: white;
            border: 1px solid #334155;
            padding: 12px 24px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #2563eb;
            border-color: #2563eb;
            transform: translateY(-2px);
        }

        footer {
            margin-top: 50px;
            color: #64748b;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>JOE X</h1>

    <div class="subtitle">
        Developer · Builder · Explorer
    </div>

    <div class="desc">
        欢迎来到我的个人网站。<br>
        这里将用于展示我的项目、学习记录以及一些有趣的实验。
    </div>

    <div class="links">
        <a class="btn" href="https://github.com" target="_blank">GitHub</a>
        <a class="btn" href="#">Projects</a>
        <a class="btn" href="#">Blog</a>
        <a class="btn" href="#">Contact</a>
    </div>

    <footer>
        © 2026 JOE X
    </footer>
</div>

</body>
</html>
